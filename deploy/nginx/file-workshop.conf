# /etc/nginx/sites-available/file-workshop
# Symlink: ln -s /etc/nginx/sites-available/file-workshop /etc/nginx/sites-enabled/

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=upload:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=download:10m rate=30r/m;
limit_conn_zone $binary_remote_addr zone=addr:10m;

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name example.com;

    # SSL (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Limits
    client_max_body_size 55m;
    limit_conn addr 20;
    server_tokens off;

    # Block hidden files and storage
    location ~ /\. { deny all; return 404; }
    location /storage { deny all; return 404; }

    # Auth — strict rate limit
    location /api/auth/ {
        limit_req zone=auth burst=3 nodelay;
        proxy_pass http://127.0.0.1:4000;
        include /etc/nginx/proxy_params;
    }

    # Upload
    location /api/files/upload {
        limit_req zone=upload burst=5 nodelay;
        client_max_body_size 55m;
        proxy_read_timeout 120s;
        proxy_pass http://127.0.0.1:4000;
        include /etc/nginx/proxy_params;
    }

    # Download
    location ~ /api/files/.*/download {
        limit_req zone=download burst=10 nodelay;
        proxy_pass http://127.0.0.1:4000;
        include /etc/nginx/proxy_params;
    }

    # API
    location /api/ {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://127.0.0.1:4000;
        include /etc/nginx/proxy_params;
    }

    # Frontend
    location / {
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/proxy_params;
    }
}
